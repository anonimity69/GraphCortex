<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300">

  <!-- Connection lines (static, decorative) -->
  <g fill="none" stroke="#9FE1CB" stroke-width="0.8" opacity="0.5">
    <line x1="55"  y1="35"  x2="140" y2="75"/>
    <line x1="140" y1="75"  x2="185" y2="25"/>
    <line x1="140" y1="75"  x2="75"  y2="155"/>
    <line x1="75"  y1="155" x2="45"  y2="270"/>
    <line x1="110" y1="215" x2="240" y2="255"/>
    <line x1="240" y1="255" x2="180" y2="290"/>
    <line x1="720" y1="45"  x2="800" y2="90"/>
    <line x1="800" y1="90"  x2="840" y2="35"/>
    <line x1="800" y1="90"  x2="865" y2="175"/>
    <line x1="865" y1="175" x2="760" y2="235"/>
    <line x1="760" y1="235" x2="695" y2="275"/>
    <line x1="760" y1="235" x2="880" y2="260"/>
  </g>

  <!-- Left cluster nodes -->
  <circle cx="55" cy="35" r="2.5" fill="#9FE1CB" stroke="#1D9E75" stroke-width="1">
    <animateTransform attributeName="transform" type="translate" values="0,0; 10,-6; -4,9; 0,0" dur="14s" repeatCount="indefinite"/>
  </circle>
  <circle cx="140" cy="75" r="2" fill="#CECBF6" stroke="#7F77DD" stroke-width="1">
    <animateTransform attributeName="transform" type="translate" values="0,0; -8,10; 5,-5; 0,0" dur="11s" begin="-3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="185" cy="25" r="2" fill="#9FE1CB" stroke="#1D9E75" stroke-width="1">
    <animateTransform attributeName="transform" type="translate" values="0,0; 6,11; -4,-7; 0,0" dur="16s" begin="-6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="75" cy="155" r="3" fill="#CECBF6" stroke="#7F77DD" stroke-width="1">
    <animateTransform attributeName="transform" type="translate" values="0,0; 11,-5; -7,9; 0,0" dur="13s" begin="-2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="110" cy="215" r="2" fill="#9FE1CB" stroke="#1D9E75" stroke-width="1">
    <animateTransform attributeName="transform" type="translate" values="0,0; -9,8; 5,-11; 0,0" dur="18s" begin="-7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="240" cy="255" r="2.5" fill="#CECBF6" stroke="#7F77DD" stroke-width="1">
    <animateTransform attributeName="transform" type="translate" values="0,0; 8,-9; -11,5; 0,0" dur="15s" begin="-4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="45" cy="270" r="2" fill="#9FE1CB" stroke="#1D9E75" stroke-width="1">
    <animateTransform attributeName="transform" type="translate" values="0,0; 13,7; -5,-10; 0,0" dur="12s" begin="-1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="180" cy="290" r="2" fill="#CECBF6" stroke="#7F77DD" stroke-width="1">
    <animateTransform attributeName="transform" type="translate" values="0,0; -7,-8; 9,5; 0,0" dur="17s" begin="-5s" repeatCount="indefinite"/>
  </circle>

  <!-- Right cluster nodes -->
  <circle cx="720" cy="45" r="2.5" fill="#CECBF6" stroke="#7F77DD" stroke-width="1">
    <animateTransform attributeName="transform" type="translate" values="0,0; -9,9; 7,-6; 0,0" dur="13s" begin="-2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="90" r="3" fill="#9FE1CB" stroke="#1D9E75" stroke-width="1">
    <animateTransform attributeName="transform" type="translate" values="0,0; 9,-11; -9,7; 0,0" dur="10s" begin="-4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="840" cy="35" r="2" fill="#CECBF6" stroke="#7F77DD" stroke-width="1">
    <animateTransform attributeName="transform" type="translate" values="0,0; -6,9; 9,-7; 0,0" dur="15s" begin="-8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="865" cy="175" r="2.5" fill="#9FE1CB" stroke="#1D9E75" stroke-width="1">
    <animateTransform attributeName="transform" type="translate" values="0,0; -11,7; 5,-9; 0,0" dur="14s" begin="-3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="760" cy="235" r="2" fill="#CECBF6" stroke="#7F77DD" stroke-width="1">
    <animateTransform attributeName="transform" type="translate" values="0,0; 9,-9; -7,11; 0,0" dur="16s" begin="-6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="695" cy="275" r="3" fill="#9FE1CB" stroke="#1D9E75" stroke-width="1">
    <animateTransform attributeName="transform" type="translate" values="0,0; -7,7; 11,-5; 0,0" dur="11s" begin="-1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="880" cy="260" r="2" fill="#CECBF6" stroke="#7F77DD" stroke-width="1">
    <animateTransform attributeName="transform" type="translate" values="0,0; -9,-7; 7,9; 0,0" dur="19s" begin="-9s" repeatCount="indefinite"/>
  </circle>

  <!-- Scattered top/bottom nodes -->
  <circle cx="310" cy="15" r="2" fill="#9FE1CB" stroke="#1D9E75" stroke-width="1">
    <animateTransform attributeName="transform" type="translate" values="0,0; 7,9; -5,5; 0,0" dur="20s" begin="-10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="590" cy="20" r="2" fill="#CECBF6" stroke="#7F77DD" stroke-width="1">
    <animateTransform attributeName="transform" type="translate" values="0,0; -7,7; 5,9; 0,0" dur="17s" begin="-5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="420" cy="285" r="2" fill="#9FE1CB" stroke="#1D9E75" stroke-width="1">
    <animateTransform attributeName="transform" type="translate" values="0,0; 9,-7; -7,5; 0,0" dur="13s" begin="-7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="560" cy="280" r="2.5" fill="#CECBF6" stroke="#7F77DD" stroke-width="1">
    <animateTransform attributeName="transform" type="translate" values="0,0; -11,9; 7,-7; 0,0" dur="15s" begin="-2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="660" cy="15" r="2" fill="#9FE1CB" stroke="#1D9E75" stroke-width="1">
    <animateTransform attributeName="transform" type="translate" values="0,0; 7,9; -9,-5; 0,0" dur="12s" begin="-4s" repeatCount="indefinite"/>
  </circle>

  <!-- Logo icon: 28x28, placed left of title text -->
  <!-- Block total: 28(logo) + 10(gap) + ~277(text) = ~315px, centered at x=450 => starts at x=293 -->
  <g transform="translate(293, 126)">
    <circle cx="14" cy="14" r="4" fill="#1D9E75"/>
    <circle cx="4"  cy="8"  r="2.5" fill="#7F77DD"/>
    <circle cx="24" cy="8"  r="2.5" fill="#7F77DD"/>
    <circle cx="4"  cy="20" r="2.5" fill="#7F77DD"/>
    <circle cx="24" cy="20" r="2.5" fill="#7F77DD"/>
    <line x1="10.2" y1="11.8" x2="6"  y2="9.2"  stroke="#1D9E75" stroke-width="1.2"/>
    <line x1="17.8" y1="11.8" x2="22" y2="9.2"  stroke="#1D9E75" stroke-width="1.2"/>
    <line x1="10.2" y1="16.2" x2="6"  y2="18.8" stroke="#1D9E75" stroke-width="1.2"/>
    <line x1="17.8" y1="16.2" x2="22" y2="18.8" stroke="#1D9E75" stroke-width="1.2"/>
    <line x1="4"    y1="10.5" x2="4"  y2="17.5" stroke="#534AB7" stroke-width="0.8" stroke-dasharray="2,2"/>
    <line x1="24"   y1="10.5" x2="24" y2="17.5" stroke="#534AB7" stroke-width="0.8" stroke-dasharray="2,2"/>
  </g>

  <!-- Title: "Graph" dark + "Cortex" green, side by side -->
  <text x="331" y="155" font-family="'Courier New', Courier, monospace" font-size="42" font-weight="500" text-anchor="start">
    <tspan fill="#1a1a1a">Graph</tspan><tspan fill="#0F6E56">Cortex</tspan>
  </text>

  <!-- Tagline -->
  <text x="450" y="183" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#6B7280" text-anchor="middle">
    Distributed neuro-symbolic graph memory for AI agents
  </text>

</svg>
